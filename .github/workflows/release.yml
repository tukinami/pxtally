name: Release
run-name: release ${{ github.ref_name }}

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Cargo cache registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - uses: dtolnay/rust-toolchain@stable
      - run: cargo check
      - run: cargo test

  build:
    needs:
      - check
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            runs-on: windows-latest
            exe: pxtally.exe
          - target: i686-pc-windows-msvc
            runs-on: windows-latest
            exe: pxtally.exe
          # - target: x86_64-unknown-linux-gnu
          #   runs-on: ubuntu-latest
          #   exe: pxtally
          # - target: x86_64-apple-darwin
          #   runs-on: macos-latest
          #   exe: pxtally
          # - target: aarch64-apple-darwin
          #   runs-on: macos-latest
          #   exe: pxtally

    runs-on: ${{ matrix.runs-on }}

    steps:
      - uses: actions/checkout@v6

      - name: Cargo cache registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare folder
        shell: bash
        run: |
          dirName="pxtally_${{ github.ref_name }}_${{ matrix.target }}"
          mkdir $dirName
          cp "target/${{ matrix.target }}/release/${{ matrix.exe }}" $dirName
          cp LICENSE README.md README.en.md $dirName

      - uses: actions/upload-artifact@v7
        with:
          name: pxtally_${{ github.ref_name }}_${{ matrix.target }}
          path: pxtally_${{ github.ref_name }}_${{ matrix.target }}/

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          path: artifacts/
          merge-multiple: true
          skip-decompress: true

      - name: Create Release
        run: |
          gh release create ${{ github.ref_name }} ./artifacts/*.zip --draft --title ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
